<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Friendly ocean carbon cycle concept graphic</title>
  <desc id="desc">A playful coastal ocean scene showing carbon moving from the atmosphere into seawater, biology, and seafloor sediments.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6d8"/>
      <stop offset="0.55" stop-color="#bfeef0"/>
      <stop offset="1" stop-color="#5ec2cf"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#55d3d0"/>
      <stop offset="0.5" stop-color="#238bb7"/>
      <stop offset="1" stop-color="#12466f"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8b46f"/>
      <stop offset="1" stop-color="#8c6441"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
